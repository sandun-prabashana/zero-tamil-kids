<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Parent Portal — ZERO TAMIL Kids</title>
  <meta name="description" content="Check your child's monthly class fee payment status for ZERO TAMIL Kids."/>
  <meta name="theme-color" content="#f5a623"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --gold:#f5a623;--gold-light:#ffc752;
      --red:#e74c3c;--green:#2ecc71;
      --bg:#0a0a0f;--bg2:#111118;--bg3:rgba(255,255,255,0.04);
      --border:rgba(255,255,255,0.08);--border-gold:rgba(245,166,35,0.3);
      --text:#f0f0ff;--muted:#9898b8;--muted2:#505068;
      --radius:16px;--radius-sm:10px;
      --t:all 0.25s cubic-bezier(0.4,0,0.2,1);
      --shadow-gold:0 8px 32px rgba(245,166,35,0.2);
      --shadow-md:0 8px 24px rgba(0,0,0,0.4);
    }
    html{font-size:16px;scroll-behavior:smooth}
    body{
      font-family:'Outfit',sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100vh;overflow-x:hidden;
      background-image:
        radial-gradient(ellipse at 15% 20%, rgba(245,166,35,0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 80%, rgba(155,89,182,0.06) 0%, transparent 55%);
    }
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:var(--bg2)}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}

    /* Orbs */
    .bg-orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(70px)}
    .orb1{width:600px;height:600px;top:-200px;right:-150px;background:radial-gradient(circle,rgba(245,166,35,0.07),transparent 70%)}
    .orb2{width:500px;height:500px;bottom:-150px;left:-100px;background:radial-gradient(circle,rgba(155,89,182,0.05),transparent 70%)}

    /* Layout */
    .wrapper{position:relative;z-index:1;max-width:620px;margin:0 auto;padding:32px 18px 60px}

    /* Top bar */
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
    .brand{display:flex;align-items:center;gap:12px}
    .brand-icon{
      width:44px;height:44px;border-radius:12px;
      background:linear-gradient(135deg,#f5a623,#ffc752);
      display:flex;align-items:center;justify-content:center;
      font-size:22px;box-shadow:var(--shadow-gold);
      animation:pulse 2.5s ease-in-out infinite;flex-shrink:0;
    }
    @keyframes pulse{0%,100%{box-shadow:0 6px 24px rgba(245,166,35,0.3)}50%{box-shadow:0 8px 36px rgba(245,166,35,0.5)}}
    .brand-text h1{font-size:14px;font-weight:700;line-height:1.3}
    .brand-text span{font-size:10.5px;color:var(--gold);font-weight:500}
    .admin-link{
      font-size:12px;color:var(--muted);border:1px solid var(--border);
      padding:6px 14px;border-radius:20px;text-decoration:none;transition:var(--t);white-space:nowrap;
    }
    .admin-link:hover{color:var(--gold);border-color:var(--border-gold)}

    /* Breadcrumb */
    .breadcrumb{
      display:flex;align-items:center;gap:8px;
      font-size:13px;color:var(--muted);margin-bottom:22px;
      flex-wrap:wrap;
    }
    .breadcrumb .crumb{cursor:pointer;transition:var(--t)}
    .breadcrumb .crumb:hover{color:var(--gold)}
    .breadcrumb .crumb.active{color:var(--text);font-weight:600;cursor:default}
    .breadcrumb .sep{color:var(--muted2)}

    /* Back button */
    .back-btn{
      display:inline-flex;align-items:center;gap:7px;
      padding:8px 16px;border-radius:var(--radius-sm);
      background:var(--bg3);border:1px solid var(--border);
      color:var(--muted);font-size:13px;font-weight:600;
      cursor:pointer;transition:var(--t);margin-bottom:20px;
      font-family:'Outfit',sans-serif;
    }
    .back-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.15);background:rgba(255,255,255,0.07)}

    /* ── STEP HERO ── */
    .step-hero{text-align:center;margin-bottom:28px}
    .step-badge{
      display:inline-flex;align-items:center;gap:7px;
      padding:5px 14px;border-radius:20px;
      background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.25);
      font-size:12px;font-weight:600;color:var(--gold);margin-bottom:14px;
    }
    .step-hero h2{font-size:24px;font-weight:800;line-height:1.3;margin-bottom:8px}
    .step-hero h2 span{
      background:linear-gradient(135deg,var(--gold),var(--gold-light));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .step-hero p{font-size:13.5px;color:var(--muted);max-width:400px;margin:0 auto;line-height:1.6}

    /* ── STEP 1: Grade Grid ── */
    .grade-grid{
      display:grid;grid-template-columns:repeat(5,1fr);gap:12px;
    }
    .grade-card{
      aspect-ratio:1;border-radius:14px;
      background:var(--bg3);border:1px solid var(--border);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
      cursor:pointer;transition:var(--t);position:relative;overflow:hidden;
    }
    .grade-card::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(245,166,35,0.1),transparent);
      opacity:0;transition:var(--t);
    }
    .grade-card:hover{border-color:rgba(245,166,35,0.4);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
    .grade-card:hover::before{opacity:1}
    .grade-card:active{transform:translateY(0)}
    .grade-num{font-size:26px;font-weight:800;color:var(--gold);line-height:1}
    .grade-lbl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
    .grade-count{
      font-size:10px;color:var(--muted2);
      position:absolute;bottom:8px;right:10px;
    }

    /* ── STEP 2: Student List ── */
    .student-grid{display:flex;flex-direction:column;gap:10px}
    .student-card{
      display:flex;align-items:center;gap:14px;
      padding:14px 18px;border-radius:var(--radius-sm);
      background:var(--bg3);border:1px solid var(--border);
      cursor:pointer;transition:var(--t);
    }
    .student-card:hover{
      background:rgba(255,255,255,0.07);
      border-color:rgba(245,166,35,0.3);
      transform:translateX(4px);
    }
    .student-card:active{transform:translateX(0)}
    .student-ava{
      width:44px;height:44px;border-radius:50%;flex-shrink:0;
      background:linear-gradient(135deg,rgba(245,166,35,0.2),rgba(245,166,35,0.05));
      border:2px solid rgba(245,166,35,0.2);
      display:flex;align-items:center;justify-content:center;font-size:20px;
    }
    .student-info{flex:1;min-width:0}
    .student-info .name{font-size:15px;font-weight:700}
    .student-info .sub{font-size:12px;color:var(--muted);margin-top:2px}
    .student-status-dot{
      width:10px;height:10px;border-radius:50%;flex-shrink:0;
    }
    .student-status-dot.paid{background:var(--green);box-shadow:0 0 8px rgba(46,204,113,0.5)}
    .student-status-dot.unpaid{background:var(--red);box-shadow:0 0 8px rgba(231,76,60,0.5)}
    .student-status-dot.loading{background:var(--muted2)}
    .student-arrow{color:var(--muted2);font-size:18px;flex-shrink:0}

    /* ── STEP 3: Payment Details ── */
    .result-card{
      background:rgba(17,17,24,0.9);border:1px solid var(--border);
      border-radius:var(--radius);overflow:hidden;
      backdrop-filter:blur(16px);box-shadow:var(--shadow-md);
      animation:fadeUp 0.3s ease;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    .student-bar{
      padding:20px 22px;display:flex;align-items:center;gap:14px;
      border-bottom:1px solid var(--border);
    }
    .s-avatar{
      width:52px;height:52px;border-radius:50%;flex-shrink:0;
      background:linear-gradient(135deg,rgba(245,166,35,0.25),rgba(245,166,35,0.08));
      border:2px solid rgba(245,166,35,0.3);
      display:flex;align-items:center;justify-content:center;font-size:24px;
    }
    .s-name{font-size:19px;font-weight:800}
    .s-meta{font-size:12.5px;color:var(--muted);margin-top:3px}
    .grade-badge{
      display:inline-flex;padding:3px 10px;border-radius:20px;
      font-size:11.5px;font-weight:600;
      background:rgba(245,166,35,0.15);color:var(--gold);
      border:1px solid rgba(245,166,35,0.25);margin-left:6px;
    }

    .current-status{padding:20px 22px;border-bottom:1px solid var(--border)}
    .section-label{
      font-size:10.5px;font-weight:700;text-transform:uppercase;
      letter-spacing:1px;color:var(--muted2);margin-bottom:12px;
    }
    .status-big{
      display:flex;align-items:center;gap:14px;
      padding:16px 18px;border-radius:12px;border:1px solid;
    }
    .status-big.paid{background:rgba(46,204,113,0.08);border-color:rgba(46,204,113,0.3)}
    .status-big.unpaid{background:rgba(231,76,60,0.08);border-color:rgba(231,76,60,0.3)}
    .status-icon-big{font-size:28px}
    .status-text .label{font-size:16px;font-weight:800}
    .status-text .label.paid{color:var(--green)}
    .status-text .label.unpaid{color:var(--red)}
    .status-text .sub{font-size:12px;color:var(--muted);margin-top:3px}
    .status-amount{margin-left:auto;text-align:right}
    .status-amount .amt{font-size:17px;font-weight:800}
    .status-amount .amt.paid{color:var(--green)}
    .status-amount .amt.unpaid{color:var(--red)}
    .status-amount .lbl{font-size:11px;color:var(--muted);margin-top:2px}

    .history-section{padding:20px 22px}
    .history-row{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 13px;border-radius:10px;
      background:rgba(255,255,255,0.03);border:1px solid var(--border);
      margin-bottom:8px;transition:var(--t);
    }
    .history-row:last-child{margin-bottom:0}
    .history-row:hover{background:rgba(255,255,255,0.05)}
    .history-month{font-size:13.5px;font-weight:600}
    .history-right{display:flex;align-items:center;gap:10px}
    .history-amt{font-size:12.5px;color:var(--muted)}
    .pill{
      display:inline-flex;align-items:center;gap:5px;
      padding:3px 11px;border-radius:20px;font-size:11.5px;font-weight:700;
    }
    .pill.paid{background:rgba(46,204,113,0.14);color:var(--green);border:1px solid rgba(46,204,113,0.28)}
    .pill.unpaid{background:rgba(231,76,60,0.14);color:var(--red);border:1px solid rgba(231,76,60,0.28)}

    /* Spinner */
    .spinner-wrap{display:flex;justify-content:center;padding:40px 0}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.75s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Empty */
    .empty-card{
      background:rgba(17,17,24,0.8);border:1px solid var(--border);
      border-radius:var(--radius);padding:40px 24px;text-align:center;
    }
    .empty-icon{font-size:40px;margin-bottom:12px;opacity:0.5}
    .empty-title{font-size:16px;font-weight:700;margin-bottom:6px}
    .empty-sub{font-size:13px;color:var(--muted)}

    /* Footer */
    .portal-footer{text-align:center;margin-top:32px;font-size:12px;color:var(--muted2);line-height:1.8}
    .portal-footer a{color:var(--muted);text-decoration:none;transition:var(--t)}
    .portal-footer a:hover{color:var(--gold)}

    /* Toast */
    .toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:10px}
    .toast{padding:12px 18px;border-radius:10px;font-size:13.5px;font-weight:500;
      display:flex;align-items:center;gap:10px;min-width:220px;
      background:var(--bg2);border:1px solid var(--border);
      box-shadow:var(--shadow-md);animation:slideIn 0.3s ease}
    .toast.error{border-color:rgba(231,76,60,0.3);color:var(--red)}
    @keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}

    @media(max-width:480px){
      .grade-grid{grid-template-columns:repeat(4,1fr)}
      .step-hero h2{font-size:20px}
      .topbar{flex-direction:column;gap:10px;text-align:center}
      .status-big{flex-wrap:wrap}
      .status-amount{margin-left:0;text-align:left}
    }
    @media(max-width:360px){
      .grade-grid{grid-template-columns:repeat(3,1fr)}
    }
  </style>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>

  <div class="wrapper">

    <!-- Top bar -->
    <div class="topbar">
      <div class="brand">
        <div class="brand-icon">🎓</div>
        <div class="brand-text">
          <h1>ZERO TAMIL Kids</h1>
          <span>Class Fee Management</span>
        </div>
      </div>
      <a href="index.html" class="admin-link">🔐 Admin Login</a>
    </div>

    <!-- Breadcrumb -->
    <div class="breadcrumb" id="breadcrumb">
      <span class="crumb active" id="bc-home">👨‍👩‍👧 Parent Portal</span>
    </div>

    <!-- Dynamic content -->
    <div id="content"></div>

    <!-- Footer -->
    <div class="portal-footer">
      <p>🎓 ZERO TAMIL Kids · Class Fee Management</p>
      <p>For queries, please contact your class teacher.</p>
      <p style="margin-top:6px"><a href="index.html">Admin Login</a></p>
    </div>

  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/parent.js"></script>
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}</script>
</body>
</html>
