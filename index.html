<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login — ZERO TAMIL Kids</title>
  <meta name="description" content="Secure login for ZERO TAMIL Kids class fee management system."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --gold:#f5a623;--gold-light:#ffc752;
      --red:#e74c3c;--bg:#0a0a0f;--bg2:#111118;
      --border:rgba(255,255,255,0.08);--text:#f0f0ff;--muted:#9898b8;
      --t:all 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    body{
      font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background-image:
        radial-gradient(ellipse at 15% 20%, rgba(245,166,35,0.09) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 80%, rgba(155,89,182,0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(52,152,219,0.04) 0%, transparent 60%);
      padding:20px;
    }

    /* Decorative circles */
    .bg-circle{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
    .bg-circle-1{width:500px;height:500px;top:-150px;right:-100px;background:radial-gradient(circle,rgba(245,166,35,0.06),transparent 70%)}
    .bg-circle-2{width:400px;height:400px;bottom:-100px;left:-80px;background:radial-gradient(circle,rgba(155,89,182,0.06),transparent 70%)}

    .login-wrapper{
      position:relative;z-index:1;
      width:100%;max-width:440px;
    }

    /* Tamil cultural top bar */
    .tamil-banner{
      text-align:center;margin-bottom:28px;
    }
    .tamil-banner .kolam{font-size:36px;animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    .tamil-banner p{font-size:13px;color:var(--muted);margin-top:6px;letter-spacing:0.5px}

    .login-card{
      background:rgba(17,17,24,0.9);
      border:1px solid var(--border);border-radius:20px;
      padding:36px 32px;
      backdrop-filter:blur(20px);
      box-shadow:0 24px 80px rgba(0,0,0,0.5);
    }

    .login-header{text-align:center;margin-bottom:30px}
    .app-logo{
      width:68px;height:68px;border-radius:18px;
      background:linear-gradient(135deg,#f5a623,#ffc752);
      display:flex;align-items:center;justify-content:center;
      font-size:34px;margin:0 auto 16px;
      box-shadow:0 8px 32px rgba(245,166,35,0.35);
      animation:pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse{0%,100%{box-shadow:0 8px 32px rgba(245,166,35,0.35)}50%{box-shadow:0 8px 48px rgba(245,166,35,0.55)}}
    .login-header h1{font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px}
    .login-header p{font-size:12.5px;color:var(--muted)}

    .form-group{margin-bottom:18px}
    .form-label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.6px}
    .input-wrap{position:relative}
    .input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--muted);pointer-events:none}
    .form-control{
      width:100%;padding:12px 14px 12px 42px;
      background:rgba(255,255,255,0.04);
      border:1px solid var(--border);border-radius:10px;
      color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;
      transition:var(--t);outline:none;
    }
    .form-control:focus{border-color:var(--gold);background:rgba(245,166,35,0.05);box-shadow:0 0 0 3px rgba(245,166,35,0.1)}
    .form-control::placeholder{color:#404058}

    .btn-login{
      width:100%;padding:13px;border:none;border-radius:10px;
      background:linear-gradient(135deg,#f5a623,#ffc752);
      color:#0a0a0f;font-family:'Outfit',sans-serif;
      font-size:15px;font-weight:700;cursor:pointer;
      transition:var(--t);margin-top:6px;
      box-shadow:0 4px 18px rgba(245,166,35,0.35);
    }
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(245,166,35,0.5)}
    .btn-login:active{transform:translateY(0)}
    .btn-login:disabled{opacity:0.6;cursor:not-allowed;transform:none}

    .error-msg{
      display:none;margin-top:14px;padding:10px 14px;
      background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.25);
      border-radius:8px;color:var(--red);font-size:13px;text-align:center;
    }
    .error-msg.show{display:block;animation:shake 0.4s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

    .login-footer{text-align:center;margin-top:22px;font-size:12px;color:var(--muted)}
    .btn-login .spinner{
      width:18px;height:18px;border:2.5px solid rgba(0,0,0,0.3);
      border-top-color:#0a0a0f;border-radius:50%;
      animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>

  <div class="login-wrapper">
    <div class="tamil-banner">
      <div class="kolam">🪔</div>
      <p>வணக்கம் · Welcome to ZERO TAMIL Kids</p>
    </div>

    <div class="login-card">
      <div class="login-header">
        <div class="app-logo">🎓</div>
        <h1>ZERO TAMIL Kids</h1>
        <p>Class Fee Management System</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email-input">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">✉️</span>
            <input id="email-input" type="email" class="form-control" placeholder="Enter your email" autocomplete="email" required/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password-input">Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input id="password-input" type="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" required/>
          </div>
        </div>
        <button id="login-btn" type="submit" class="btn-login">Sign In</button>
        <div id="error-msg" class="error-msg"></div>
      </form>
    </div>

    <div class="login-footer">
      <p>🔐 Secured with Firebase Authentication</p>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // If already logged in, go to dashboard
    redirectIfAuth();

    const form    = document.getElementById('login-form');
    const btn     = document.getElementById('login-btn');
    const errMsg  = document.getElementById('error-msg');

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const email    = document.getElementById('email-input').value.trim();
      const password = document.getElementById('password-input').value;
      if (!email || !password) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in…';
      errMsg.classList.remove('show');

      try {
        await login(email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        const msgs = {
          'auth/user-not-found':    'No account found with this email.',
          'auth/wrong-password':    'Incorrect password. Please try again.',
          'auth/invalid-email':     'Please enter a valid email address.',
          'auth/too-many-requests': 'Too many attempts. Please try again later.',
          'auth/invalid-credential':'Invalid email or password.'
        };
        errMsg.textContent = msgs[err.code] || 'Login failed. Check your credentials.';
        errMsg.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    });
  </script>
</body>
</html>
